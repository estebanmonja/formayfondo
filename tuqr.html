<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FFT // QR_HYBRID_v1.2</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;600;900&family=Fira+Code:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        neon: { 500: '#ff0098' },
                        neutral: { 50: '#fafafa', 900: '#171717' }
                    },
                    fontFamily: {
                        sans: ['Barlow', 'sans-serif'],
                        mono: ['Fira Code', 'monospace'],
                    }
                }
            }
        }
    </script>

    <style>
        body { font-family: 'Barlow', sans-serif; }
        .grid-bg { 
            background-image: linear-gradient(#f0f0f0 1px, transparent 1px), linear-gradient(90deg, #f0f0f0 1px, transparent 1px); 
            background-size: 40px 40px; 
        }
        .input-fft {
            background-color: #f8f9fa; border: 2px solid #000;
            padding: 1rem; width: 100%; outline: none; transition: all 0.3s;
        }
        .input-fft:focus { border-color: #ff0098; background-color: white; }
        #qr-container svg { width: 100%; height: auto; display: block; }
    </style>
</head>
<body class="bg-white text-neutral-900 antialiased min-h-screen flex items-center justify-center p-6">

    <div class="fixed inset-0 z-0 grid-bg pointer-events-none opacity-40"></div>

    <main class="relative z-10 w-full max-w-xl">
        <div class="border-4 border-black bg-white p-8 md:p-12 shadow-[16px_16px_0px_0px_#ff0098]">
            
            <div class="mb-8 border-b-4 border-black pb-6">
                <span class="font-mono text-[10px] text-neon-500 block mb-2 font-bold tracking-widest uppercase">System_Tools // 006.v2</span>
                <h1 class="text-4xl md:text-5xl font-black uppercase tracking-tighter leading-none">Generador <br> de <span class="text-neon-500">Códigos QR.</span></h1>
            </div>

            <div class="space-y-6">
                <div>
                    <label class="block font-black uppercase text-[10px] tracking-widest mb-2">Contenido del Código (URL/Texto)</label>
                    <input type="text" id="text" value="https://formayfondotaller.com" class="input-fft font-bold">
                </div>
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <button id="make" class="py-4 bg-black text-white font-black uppercase tracking-widest hover:bg-neon-500 transition-all shadow-[4px_4px_0px_0px_rgba(255,0,152,0.5)] active:translate-y-1">
                        Generar_
                    </button>
                    <button id="downloadBtn" class="py-4 border-2 border-black font-black uppercase tracking-widest hover:bg-black hover:text-white transition-all shadow-hard">
                        Descargar SVG_
                    </button>
                </div>
            </div>

            <div class="mt-12 flex flex-col items-center">
                <div id="qr-container" class="w-64 h-64 border-2 border-black p-4 bg-white shadow-[8px_8px_0px_0px_#171717]">
                    </div>
                <p class="mt-6 font-mono text-[10px] text-neutral-400 uppercase tracking-widest">
                    Formato: 70x70mm // Hybrid Geometry: Matrix-Dots + Finder-Squares
                </p>
            </div>
        </div>
    </main>

    <script>
        const input = document.getElementById("text");
        const container = document.getElementById("qr-container");

        const generateHybridQR = () => {
            const size = 500; // Resolution for SVG output
            const segments = QRCode.create(input.value, { errorCorrectionLevel: 'H' });
            const moduleCount = segments.modules.size;
            const cellSize = size / moduleCount;
            const dotRadius = cellSize * 0.4;

            let svgContent = `<svg viewBox="0 0 ${size} ${size}" xmlns="http://www.w3.org/2000/svg">`;
            svgContent += `<rect width="100%" height="100%" fill="white"/>`;

            for (let row = 0; row < moduleCount; row++) {
                for (let col = 0; col < moduleCount; col++) {
                    if (segments.modules.get(row, col)) {
                        // Logic to detect if we are inside the three "Finder Patterns" (usually 7x7 squares)
                        const isTopLeft = (row < 7 && col < 7);
                        const isTopRight = (row < 7 && col >= moduleCount - 7);
                        const isBottomLeft = (row >= moduleCount - 7 && col < 7);

                        if (isTopLeft || isTopRight || isBottomLeft) {
                            // Render as solid square for the corners
                            svgContent += `<rect x="${col * cellSize}" y="${row * cellSize}" width="${cellSize}" height="${cellSize}" fill="black"/>`;
                        } else {
                            // Render as circle for the data
                            const cx = col * cellSize + cellSize / 2;
                            const cy = row * cellSize + cellSize / 2;
                            svgContent += `<circle cx="${cx}" cy="${cy}" r="${dotRadius}" fill="black"/>`;
                        }
                    }
                }
            }
            svgContent += `</svg>`;
            container.innerHTML = svgContent;
        };

        document.getElementById("downloadBtn").onclick = () => {
            const svgData = container.innerHTML;
            const blob = new Blob([svgData], { type: "image/svg+xml;charset=utf-8" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            a.download = `FFT_Hybrid_QR.svg`;
            a.click();
        };

        document.getElementById("make").onclick = generateHybridQR;
        window.onload = generateHybridQR;
    </script>
</body>
</html>
