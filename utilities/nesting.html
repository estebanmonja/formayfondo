<div>

<div>
<label class="block font-black uppercase text-xs tracking-widest mb-2">Alto Hoja (mm)</label>

</div>

<div>
<label class="block font-black uppercase text-xs tracking-widest mb-2">Ancho Pieza (mm)</label>
<input type="number" id="partW" value="15"
class="w-full bg-neutral-50 border-b-2 border-neutral-200 p-3 focus:border-neon-500 focus:bg-white outline-none">

<div>
<label class="block font-black uppercase text-xs tracking-widest mb-2">Alto Pieza (mm)</label>

<div>

<input type="number" id="bleedY" value="10" step="0.1"
class="w-full bg-neutral-50 border-b-2 border-neutral-200 p-3 focus:border-neon-500 focus:bg-white outline-none">
</div>

</div>

<!-- RESULTS -->
<div class="grid md:grid-cols-4 gap-6 mb-10 font-mono text-sm border-t-4 border-black pt-6">

<div id="preview-container"></div>
</div>

<script>

function updateLayout() {

const bW = parseFloat(boardW.value) || 0;
const bH = parseFloat(boardH.value) || 0;
const pW = parseFloat(partW.value) || 0;
const pH = parseFloat(partH.value) || 0;
const gap = parseFloat(gapInput.value) || 0;
const bleedX = parseFloat(bleedXInput.value) || 0;
const bleedY = parseFloat(bleedYInput.value) || 0;

}
</script>

<script>

// Rebind IDs correctly (clean reference handling)

const boardW = document.getElementById('boardW');
const boardH = document.getElementById('boardH');
const partW = document.getElementById('partW');
const partH = document.getElementById('partH');
const gapInput = document.getElementById('gap');
const bleedXInput = document.getElementById('bleedX');
const bleedYInput = document.getElementById('bleedY');

function updateLayout() {

const bW = parseFloat(boardW.value) || 0;
const bH = parseFloat(boardH.value) || 0;
const pW = parseFloat(partW.value) || 0;
const pH = parseFloat(partH.value) || 0;
const gap = parseFloat(gapInput.value) || 0;
const bleedX = parseFloat(bleedXInput.value) || 0;
const bleedY = parseFloat(bleedYInput.value) || 0;

const usableW = bW - (bleedX * 2);
const usableH = bH - (bleedY * 2);

if (usableW <= 0 || usableH <= 0) {
    document.getElementById('preview-container').innerHTML = "";
    return;
}

const cols = Math.floor((usableW + gap) / (pW + gap));
const rows = Math.floor((usableH + gap) / (pH + gap));
const totalCount = Math.max(0, cols * rows);

const totalUsedW = (cols * pW) + ((cols - 1) * gap);
const totalUsedH = (rows * pH) + ((rows - 1) * gap);

const offsetX = bleedX + (usableW - totalUsedW) / 2;
const offsetY = bleedY + (usableH - totalUsedH) / 2;

let rects = "";
let toolpaths = "";

if (totalCount > 0) {

for (let r = 0; r < rows; r++) {
for (let c = 0; c < cols; c++) {
const x = offsetX + (c * (pW + gap));
const y = offsetY + (r * (pH + gap));
rects += `<rect x="${x.toFixed(3)}" y="${y.toFixed(3)}" width="${pW}" height="${pH}" />`;
}
}

for (let c = 0; c <= cols; c++) {
const x = offsetX - (gap / 2) + (c * (pW + gap));
toolpaths += `<line x1="${x.toFixed(3)}" y1="${bleedY}" x2="${x.toFixed(3)}" y2="${(bH - bleedY).toFixed(3)}" />`;
}

for (let r = 0; r <= rows; r++) {
const y = offsetY - (gap / 2) + (r * (pH + gap));
toolpaths += `<line x1="${bleedX}" y1="${y.toFixed(3)}" x2="${(bW - bleedX).toFixed(3)}" y2="${y.toFixed(3)}" />`;
}

}

const svgContent = `
<svg xmlns="http://www.w3.org/2000/svg"
width="${bW}mm" height="${bH}mm"
viewBox="0 0 ${bW} ${bH}">
<rect x="0" y="0" width="${bW}" height="${bH}"
fill="none" stroke="red" stroke-width="0.5" />
<rect x="${bleedX}" y="${bleedY}"
width="${usableW}" height="${usableH}"
fill="none" stroke="orange"
stroke-width="0.3" stroke-dasharray="5,5"/>
<g fill="none" stroke="black" stroke-width="0.2">${rects}</g>
<g fill="none" stroke="blue" stroke-width="0.4">${toolpaths}</g>
</svg>`;

document.getElementById('preview-container').innerHTML = svgContent;
document.getElementById('totalParts').innerText = totalCount;
document.getElementById('gridLayout').innerText = `${cols} H x ${rows} V`;

const efficiency = bW * bH > 0
? (((totalCount * pW * pH) / (bW * bH)) * 100).toFixed(1)
: 0;

document.getElementById('efficiency').innerText = efficiency;
}

function downloadSVG() {
const svgData = document.getElementById('preview-container').innerHTML;
const blob = new Blob([svgData], { type: "image/svg+xml;charset=utf-8" });
const url = URL.createObjectURL(blob);
const link = document.createElement("a");
link.href = url;
link.download = "FFT_nesting_layout.svg";
link.click();
}

document.querySelectorAll("input").forEach(input => {
input.addEventListener("input", updateLayout);
});

updateLayout();

</script>
