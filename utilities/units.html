<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.tailwindcss.com"></script>

tailwind.config = {
    theme: {
        extend: {
            colors: {
                neon: {
                    400: '#ff33ad',
                    500: '#ff0098',
                    600: '#cc007a',
                },
                neutral: {
                    50: '#fafafa',
                    900: '#171717',
                }
            },
            fontFamily: {
                sans: ['Barlow', 'sans-serif'],
                mono: ['Fira Code', 'monospace'],
            },
            boxShadow: {
                'hard': '4px 4px 0px 0px rgba(0,0,0,1)',
                'hard-neon': '8px 8px 0px 0px #ff0098',
            }
        }
    }

</script>

<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;600;900&family=Fira+Code:wght@400;600&display=swap" rel="stylesheet">

<style>
body { font-family: 'Barlow', sans-serif; }
input::-webkit-outer-spin-button,
input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
</style>
</head>

<body class="bg-neutral-50 text-neutral-900 antialiased selection:bg-neon-500 selection:text-white">

<div class="min-h-screen flex items-center justify-center px-6">

<div class="w-full max-w-3xl bg-white border-2 border-black shadow-hard-neon p-10">

<!-- HEADER -->
<div class="mb-10 border-b-4 border-black pb-6 flex justify-between items-end">

<div>
<span class="text-neon-500 font-mono text-xs uppercase tracking-widest">SYSTEM TOOL</span>
<h1 class="text-5xl font-black tracking-tighter uppercase">
Cross Unit Converter
</h1>
<p class="font-mono text-xs text-neutral-400 mt-2">
FFT_LENGTH_MODULE_v2.0
</p>
</div>

<div class="text-right font-mono text-[10px] uppercase tracking-widest space-y-1">
<a href="index.html" class="block border-b-2 border-black hover:text-neon-500 hover:border-neon-500">
[ Back_to_Utilities ]
</a>
<a href="../index.html" class="block border-b-2 border-black hover:text-neon-500 hover:border-neon-500">
[ Back_to_FFT ]
</a>
</div>

</div>


<!-- CONVERTER GRID -->
<div class="grid md:grid-cols-2 gap-10 items-end">

<!-- LEFT SIDE -->
<div>
<label class="block font-black uppercase text-xs tracking-widest mb-2">Side A</label>

<select id="unitA"
class="w-full mb-4 border-2 border-black p-3 font-black uppercase text-sm shadow-hard focus:border-neon-500 outline-none">
<option value="mm">Millimeter (mm)</option>
<option value="m">Meter (m)</option>
<option value="in">Inch (in)</option>
<option value="ft">Feet (ft)</option>
</select>

<input id="inputA" type="text"
class="w-full bg-neutral-50 border-b-2 border-neutral-200 p-4 focus:border-neon-500 focus:bg-white outline-none transition-all font-mono text-3xl tabular-nums"
placeholder="0.00">
</div>

<!-- RIGHT SIDE -->
<div>
<label class="block font-black uppercase text-xs tracking-widest mb-2">Side B</label>

<select id="unitB"
class="w-full mb-4 border-2 border-black p-3 font-black uppercase text-sm shadow-hard focus:border-neon-500 outline-none">
<option value="in">Inch (in)</option>
<option value="ft">Feet (ft)</option>
<option value="mm">Millimeter (mm)</option>
<option value="m">Meter (m)</option>
</select>

<input id="inputB" type="text"
class="w-full bg-neutral-50 border-b-2 border-neutral-200 p-4 focus:border-neon-500 focus:bg-white outline-none transition-all font-mono text-3xl tabular-nums"
placeholder="0.00">
</div>

</div>

<!-- SWAP BUTTON -->
<div class="mt-10 text-center">
<button id="swapBtn"
class="px-10 py-4 border-2 border-black font-black uppercase tracking-widest shadow-hard hover:bg-neon-500 hover:text-white transition-all">
Swap ⇄
</button>
</div>

</div>
</div>

<script>
const inputA = document.getElementById("inputA");
const inputB = document.getElementById("inputB");
const unitA = document.getElementById("unitA");
const unitB = document.getElementById("unitB");
const swapBtn = document.getElementById("swapBtn");

const mmPerInch = 25.4;
const mmPerFoot = 304.8;

function toMillimeters(value, unit) {
    switch(unit) {
        case "mm": return value;
        case "m": return value * 1000;
        case "in": return value * mmPerInch;
        case "ft": return value * mmPerFoot;
    }
}

function fromMillimeters(value, unit) {
    switch(unit) {
        case "mm": return value;
        case "m": return value / 1000;
        case "in": return value / mmPerInch;
        case "ft": return value / mmPerFoot;
    }
}

function round(val) {
    return Math.round(val * 10000000) / 10000000;
}

function safeParse(val) {
    if (val === "" || val === "-" || val === ".") return null;
    return parseFloat(val);
}

function convertFromA() {
    const value = safeParse(inputA.value);
    if (value === null || isNaN(value)) { inputB.value = ""; return; }

    const mm = toMillimeters(value, unitA.value);
    const result = fromMillimeters(mm, unitB.value);
    inputB.value = round(result);
}

function convertFromB() {
    const value = safeParse(inputB.value);
    if (value === null || isNaN(value)) { inputA.value = ""; return; }

    const mm = toMillimeters(value, unitB.value);
    const result = fromMillimeters(mm, unitA.value);
    inputA.value = round(result);
}

inputA.addEventListener("input", convertFromA);
inputB.addEventListener("input", convertFromB);
unitA.addEventListener("change", convertFromA);
unitB.addEventListener("change", convertFromA);

swapBtn.addEventListener("click", () => {
    const tempUnit = unitA.value;
    unitA.value = unitB.value;
    unitB.value = tempUnit;

    const tempVal = inputA.value;
    inputA.value = inputB.value;
    inputB.value = tempVal;
});
</script>

</body>
</html>
