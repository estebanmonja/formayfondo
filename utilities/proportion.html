<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FFT // RULE_OF_THREE_v1.0</title>

<script src="https://cdn.tailwindcss.com"></script>

<script>
tailwind.config = {
theme:{
extend:{
colors:{
neon:{400:'#ff33ad',500:'#ff0098',600:'#cc007a'},
neutral:{50:'#fafafa',900:'#171717'}
},
fontFamily:{
sans:['Barlow','sans-serif'],
mono:['Fira Code','monospace']
},
boxShadow:{
'hard':'4px 4px 0px 0px rgba(0,0,0,1)',
'hard-neon':'8px 8px 0px 0px #ff0098'
}
}
}
}
</script>

<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;600;900&family=Fira+Code:wght@400;600&display=swap" rel="stylesheet">

<style>
body{font-family:'Barlow',sans-serif;}
input::-webkit-outer-spin-button,
input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0;}
</style>
</head>

<body class="bg-neutral-50 text-neutral-900 antialiased">

<div class="min-h-screen flex items-center justify-center px-6">

<div class="w-full max-w-3xl bg-white border-2 border-black shadow-hard-neon p-10">

<!-- HEADER -->

<div class="mb-10 border-b-4 border-black pb-6 flex justify-between items-end">

<div>
<span class="text-neon-500 font-mono text-xs uppercase tracking-widest">SYSTEM TOOL</span>
<h1 class="text-5xl font-black tracking-tighter uppercase">
Rule of Three
</h1>
<p class="font-mono text-xs text-neutral-400 mt-2">
FFT_PROPORTION_MODULE_v1.0
</p>
</div>

<div class="text-right font-mono text-[10px] uppercase tracking-widest space-y-1">

<a href="index.html"
class="block border-b-2 border-black hover:text-neon-500 hover:border-neon-500">
[ Back_to_Utilities ]
</a>

<a href="../index.html"
class="block border-b-2 border-black hover:text-neon-500 hover:border-neon-500">
[ Back_to_FFT ]
</a>

</div>
</div>

<!-- CALCULATOR -->

<div class="grid md:grid-cols-2 gap-10 items-end">

<div>
<label class="block font-black uppercase text-xs tracking-widest mb-2">Valor A</label>
<input id="valA" type="number" step="any"
class="w-full bg-neutral-50 border-b-2 border-neutral-200 p-4 focus:border-neon-500 outline-none font-mono text-2xl">
</div>

<div>
<label class="block font-black uppercase text-xs tracking-widest mb-2">Valor B</label>
<input id="valB" type="number" step="any"
class="w-full bg-neutral-50 border-b-2 border-neutral-200 p-4 focus:border-neon-500 outline-none font-mono text-2xl">
</div>

<div>
<label class="block font-black uppercase text-xs tracking-widest mb-2">Valor C</label>
<input id="valC" type="number" step="any"
class="w-full bg-neutral-50 border-b-2 border-neutral-200 p-4 focus:border-neon-500 outline-none font-mono text-2xl">
</div>

<div>
<label class="block font-black uppercase text-xs tracking-widest mb-2">Resultado X</label>
<input id="resultX" type="text" readonly
class="w-full bg-neutral-100 border-b-2 border-black p-4 font-mono text-3xl tabular-nums">
</div>

</div>

<!-- FORMULA -->

<div class="mt-10 border-t-4 border-black pt-6 text-center font-mono text-sm text-neutral-500">

A : B = C : X  
<br>
X = (B × C) / A

</div>

</div>
</div>

<script>

const A = document.getElementById("valA");
const B = document.getElementById("valB");
const C = document.getElementById("valC");
const X = document.getElementById("resultX");

function calculate(){

const a = parseFloat(A.value);
const b = parseFloat(B.value);
const c = parseFloat(C.value);

if(isNaN(a) || a === 0 || isNaN(b) || isNaN(c)){
X.value="";
return;
}

const result = (b * c) / a;

X.value = result.toFixed(8);
}

A.addEventListener("input",calculate);
B.addEventListener("input",calculate);
C.addEventListener("input",calculate);

</script>

</body>
</html>
