<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FFT // INICIAR_PROTOCOLO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { neon: { 500: '#ff0098' }, neutral: { 900: '#171717' } },
                    fontFamily: { sans: ['Barlow', 'sans-serif'], mono: ['Fira Code', 'monospace'] },
                    boxShadow: { 'hard': '8px 8px 0px 0px #171717', 'hard-neon': '12px 12px 0px 0px #ff0098' }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;700;900&family=Fira+Code:wght@400;600&display=swap" rel="stylesheet">
    <style>
        .grid-bg { 
            background-image: linear-gradient(#e5e7eb 1px, transparent 1px), linear-gradient(90deg, #e5e7eb 1px, transparent 1px); 
            background-size: 40px 40px; 
        }
        .blink { animation: blink 1s step-end infinite; }
        @keyframes blink { 50% { opacity: 0; } }
        .input-terminal {
            background: transparent; border: none; border-bottom: 2px solid #171717;
            padding: 0.5rem 0; width: 100%; outline: none; font-family: 'Fira Code', monospace;
        }
        .input-terminal:focus { border-color: #ff0098; }
    </style>
</head>
<body class="bg-white text-neutral-900 font-sans antialiased overflow-x-hidden">

    <div class="fixed inset-0 z-0 grid-bg opacity-30"></div>

    <main class="relative z-10 min-h-screen flex flex-col lg:flex-row">
        
        <section class="lg:w-1/2 p-8 lg:p-20 flex flex-col justify-between border-b-2 lg:border-b-0 lg:border-r-2 border-black bg-white">
            <div>
                <img src="logo.svg" alt="FFT" class="h-12 w-auto mb-12">
                <h1 class="text-[12vw] lg:text-8xl font-black uppercase leading-[0.8] tracking-tighter mb-8">
                    HABLEMOS <br>DE <span class="text-neon-500">Materia.</span>
                </h1>
                <div class="space-y-4 max-w-md">
                    <p class="text-xl font-bold italic border-l-4 border-black pl-4">
                        "Cada objeto comienza con una instrucción clara."
                    </p>
                    <p class="text-neutral-500 font-medium">
                        Estamos listos para procesar tu idea. Ya sea un archivo listo para CNC o una intención que necesita estructura.
                    </p>
                </div>
            </div>

            <div class="mt-12 space-y-8">
                <div>
                    <span class="block font-mono text-[10px] uppercase tracking-[0.3em] text-neutral-400 mb-2 font-bold">Directo_Taller</span>
                    <a href="mailto:esteban@formayfondotaller.com" class="text-2xl font-black hover:text-neon-500 transition-colors break-words">
                        esteban@formayfondotaller.com
                    </a>
                </div>
                <div>
                    <span class="block font-mono text-[10px] uppercase tracking-[0.3em] text-neutral-400 mb-2 font-bold">Canal_Urgente</span>
                    <a href="https://wa.me/523315305043" class="text-2xl font-black hover:text-neon-500 transition-colors">
                        +52 3315 30 5043
                    </a>
                </div>
            </div>
        </section>

        <section class="lg:w-1/2 p-8 lg:p-20 bg-neutral-900 text-white flex items-center">
            <div class="w-full bg-black border-2 border-white/10 p-8 lg:p-12 shadow-hard-neon relative">
                <div class="absolute top-0 right-0 p-4 font-mono text-[10px] text-neon-500/50">SYS_V1.1 // IN_CONVERSATION</div>
                
                <form id="quoteForm" class="space-y-12">
                    <div class="space-y-2">
                        <label class="font-mono text-xs uppercase text-neon-500 font-bold">01_Identidad</label>
                        <input type="text" id="name" placeholder="NOMBRE_O_EMPRESA..." class="input-terminal text-white uppercase" required>
                    </div>

                    <div class="space-y-2">
                        <label class="font-mono text-xs uppercase text-neon-500 font-bold">02_Materia</label>
                        <select id="type" class="input-terminal text-white font-mono text-sm appearance-none bg-black">
                            <option>CORTE_CNC_MADERA</option>
                            <option>PROTOTIPADO_POLIMEROS</option>
                            <option>ENSAMBLE_ESTRUCTURAL</option>
                            <option>OTRO_REQUERIMIENTO</option>
                        </select>
                    </div>

                    <div class="space-y-2">
                        <label class="font-mono text-xs uppercase text-neon-500 font-bold">03_Briefing</label>
                        <textarea id="desc" rows="3" placeholder="DESCRIBE_TU_PROYECTO..." class="input-terminal text-white uppercase resize-none" required></textarea>
                    </div>

                    <button type="submit" class="group flex items-center gap-4 bg-white text-black font-black uppercase px-8 py-4 hover:bg-neon-500 hover:text-white transition-all">
                        ENVIAR_PROTOCOLO <span class="blink">_</span>
                    </button>
                </form>
            </div>
        </section>
    </main>

    <script>
        document.getElementById('quoteForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const name = document.getElementById('name').value;
            const type = document.getElementById('type').value;
            const desc = document.getElementById('desc').value;
            const text = `FFT_CONNECTION: Hola Esteban. Protocolo iniciado por: ${name}. Tipo: ${type}. Brief: ${desc}`;
            window.open(`https://wa.me/523315305043?text=${encodeURIComponent(text)}`, '_blank'); //
        });
    </script>
</body>
</html>
