<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FFT | Pentomino Specimen</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { neon: { 500: '#ff0098' } },
                    fontFamily: { sans: ['Barlow', 'sans-serif'], mono: ['Fira Code', 'monospace'] }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;700;900&family=Fira+Code:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Barlow', sans-serif; background-color: #fafafa; touch-action: none; overflow: hidden; }
        .bg-grid { background-image: linear-gradient(#000 1px, transparent 1px), linear-gradient(90deg, #000 1px, transparent 1px); background-size: 40px 40px; opacity: 0.03; }
        .shadow-hard { box-shadow: 12px 12px 0px 0px #171717; }
        .console-btn { cursor: pointer; transition: color 0.1s; user-select: none; }
        .console-btn:hover { color: #ff0098; }
    </style>
</head>
<body class="bg-neutral-50 text-neutral-900 select-none">
    <div class="fixed inset-0 bg-grid pointer-events-none"></div>

    <header class="fixed top-0 w-full px-4 pt-4 md:px-12 md:pt-12 flex justify-between items-start z-50">
        <div class="flex items-start gap-3">
            <div class="w-8 h-8 flex-shrink-0 relative">
                <img src="logo.svg" alt="FFT Logo" class="w-full h-full object-contain">
            </div>
            <h1 class="font-black text-lg md:text-3xl uppercase leading-[0.9] tracking-tighter">
                PENTOMINO<br><span class="text-neon-500">POCKET_SERIES</span>
            </h1>
        </div>
        <div class="text-right font-mono text-[7px] md:text-[10px] tracking-widest text-neutral-400 uppercase leading-tight">
            <p>Process: CNC_Milled / Beeswax</p>
            <p>Phase: <span id="state-id" class="text-black font-bold">01</span></p>
            <p>Status: <span id="state-label" class="text-neon-500">INITIAL</span></p>
        </div>
    </header>

    <main class="h-screen w-full flex flex-col items-center justify-center relative z-10 px-6">
        <div class="relative">
            <div id="main-frame" class="bg-white border-2 border-black p-3 md:p-10 shadow-hard overflow-hidden">
                <div id="touch-zone" class="w-[70vw] h-[70vw] max-w-[320px] max-h-[320px] md:w-[500px] md:h-[500px] flex items-center justify-center cursor-pointer">
                    <img id="main-specimen" src="svg/01.svg" class="w-full h-full object-contain" alt="Pentomino State">
                </div>
            </div>
            <div class="absolute -top-2 -left-2 bg-neon-500 text-white px-2 py-0.5 font-mono text-[8px] uppercase shadow-hard">Unit_01</div>
            <div class="absolute -bottom-2 -right-2 bg-black text-white px-3 py-1 font-black text-[8px] uppercase tracking-tighter">Cycle: Tap to Solve</div>
        </div>

        <nav class="mt-12 text-center">
            <div class="flex flex-col items-center">
                <div class="flex items-center gap-8">
                    <span class="console-btn font-mono text-xs tracking-tighter text-neutral-400" onclick="cycleStates()">[ NEXT_STATE ]</span>
                </div>
                <div class="h-1 w-24 bg-black mt-2"></div>
                <p class="font-mono text-[8px] text-neutral-400 mt-4 tracking-widest uppercase">Tap image to progress through solution</p>
            </div>
        </nav>
    </main>

    <footer class="fixed bottom-0 w-full p-4 md:p-12 flex justify-between items-end z-50 pointer-events-none">
        <div class="font-mono text-[7px] md:text-[8px] text-neutral-400 space-y-0.5 uppercase tracking-widest">
            <p>Material: Wood / Edible Ink</p>
            <p>Origin: FFT_Workshop</p>
        </div>
        <div class="pointer-events-auto">
            <a href="https://formayfondotaller.com/" target="" class="text-[9px] md:text-[10px] font-bold uppercase tracking-tighter hover:text-neon-500 border-b-2 border-black">FFT_SYSTEM</a>
        </div>
    </footer>

    <script>
        let currentState = 1; // 1, 2, or 3
        const states = {
            1: { label: "FILLED", file: "01.svg" },
            2: { label: "HINT_GRID", file: "02.svg" },
            3: { label: "SOLVED", file: "03.svg" }
        };
        
        const imgDisplay = document.getElementById('main-specimen');
        const stateLabel = document.getElementById('state-label');
        const stateIdLabel = document.getElementById('state-id');
        const touchZone = document.getElementById('touch-zone');

        function updateDisplay() {
            const stateInfo = states[currentState];
            imgDisplay.src = `svg/${stateInfo.file}`;
            stateIdLabel.innerText = currentState.toString().padStart(2, '0');
            stateLabel.innerText = stateInfo.label;
        }

        function cycleStates() {
            currentState = currentState % 3 + 1; // Loops 1 -> 2 -> 3 -> 1
            updateDisplay();
        }

        // Interaction Listeners
        touchZone.addEventListener('click', cycleStates);
        
        window.addEventListener('keydown', e => {
            if (e.key === ' ' || e.key === 'ArrowRight' || e.key === 'Enter') {
                cycleStates();
            }
        });

        // Initialize
        updateDisplay();
    </script>
</body>
</html>
