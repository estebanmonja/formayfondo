<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tangram</title>

  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f5f5f5;
      color: #111;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      width: 90%;
      max-width: 400px;
      background: white;
      padding: 24px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }

    h1 {
      font-size: 22px;
      margin-bottom: 8px;
    }

    .price {
      font-size: 18px;
      margin-bottom: 24px;
      color: #555;
    }

    .qty-control {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
    }

    .qty-btn {
      width: 40px;
      height: 40px;
      border: none;
      background: #eee;
      border-radius: 8px;
      font-size: 18px;
    }

    .qty {
      font-size: 18px;
      width: 40px;
      text-align: center;
    }

    .total {
      font-size: 20px;
      margin-bottom: 24px;
    }

    button.main {
      width: 100%;
      height: 48px;
      border: none;
      border-radius: 12px;
      background: #111;
      color: white;
      font-size: 16px;
    }

    button:active {
      opacity: 0.8;
    }
  </style>
</head>

<body>

<div class="container">
  <h1>Tangram</h1>
  <div class="price">$150 MXN</div>

  <div class="qty-control">
    <button class="qty-btn" onclick="changeQty(-1)">−</button>
    <div class="qty" id="qty">1</div>
    <button class="qty-btn" onclick="changeQty(1)">+</button>
  </div>

  <div class="total" id="total">$150 MXN</div>

  <button class="main" onclick="checkout()">Continue</button>
</div>

<script>
  let price = 150;
  let qty = 1;

  function changeQty(delta) {
    qty += delta;
    if (qty < 1) qty = 1;

    document.getElementById("qty").innerText = qty;
    updateTotal();
  }

  function updateTotal() {
    let total = price * qty;
    document.getElementById("total").innerText = "$" + total + " MXN";
  }

  function checkout() {
    let total = price * qty;
    alert("Proceed to payment\n\nItems: " + qty + "\nTotal: $" + total + " MXN");
  }
</script>

</body>
</html>
