<!DOCTYPE html>
<html lang="es">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FFT | Specimen Reel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { neon: { 500: '#ff0098' } },
                    fontFamily: { sans: ['Barlow', 'sans-serif'], mono: ['Fira Code', 'monospace'] }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;700;900&family=Fira+Code:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Barlow', sans-serif; background-color: #fafafa; touch-action: none; overflow: hidden; }
        .bg-grid { background-image: linear-gradient(#000 1px, transparent 1px), linear-gradient(90deg, #000 1px, transparent 1px); background-size: 40px 40px; opacity: 0.03; }
        .shadow-hard { box-shadow: 12px 12px 0px 0px #171717; }
        .console-btn { cursor: pointer; transition: color 0.1s; user-select: none; }
        .console-btn:hover { color: #ff0098; }
        .console-btn:active { opacity: 0.5; }
    </style>
</head>
<body class="bg-neutral-50 text-neutral-900 select-none">
    <div class="fixed inset-0 bg-grid pointer-events-none"></div>

    <header class="fixed top-0 w-full px-4 pt-4 md:px-12 md:pt-12 flex justify-between items-start z-50">
        <div class="flex items-start gap-3">
            <div class="w-8 h-8 flex-shrink-0 relative">
                <img src="logo.svg" alt="FFT Logo" class="w-full h-full object-contain">
            </div>
            <h1 class="font-black text-lg md:text-3xl uppercase leading-[0.9] tracking-tighter">
                TANGRAM<br><span class="text-neon-500">SEQUENTIAL_LIB</span>
            </h1>
        </div>
        <div class="text-right font-mono text-[7px] md:text-[10px] tracking-widest text-neutral-400 uppercase leading-tight">
            <p>Input: Touch/Scroll/Keys</p>
            <p>ID: <span id="ref-id" class="text-black font-bold">000</span></p>
            <p>State: <span id="state-label" class="text-neon-500">FILLED</span></p>
        </div>
    </header>

    <main class="h-screen w-full flex flex-col items-center justify-center relative z-10 px-6">
        <div class="relative mt-4 md:mt-0">
            <div id="main-frame" class="bg-white border-2 border-black p-3 md:p-10 shadow-hard overflow-hidden">
                <div id="touch-zone" class="w-[60vw] h-[60vw] max-w-[280px] max-h-[280px] md:w-[450px] md:h-[450px] flex items-center justify-center cursor-pointer">
                    <img id="main-specimen" src="svg/000.svg" class="w-full h-full object-contain" alt="Specimen">
                </div>
            </div>
            <div class="absolute -top-2 -left-2 bg-neon-500 text-white px-2 py-0.5 font-mono text-[8px] uppercase shadow-hard">Structure_Core</div>
            <div class="absolute -bottom-2 -right-2 bg-black text-white px-3 py-1 font-black text-[8px] uppercase tracking-tighter">Toggle: Tap</div>
        </div>

        <nav class="mt-8 md:mt-12 text-center">
            <div class="flex flex-col items-center">
                <div class="flex items-center gap-6 md:gap-12">
                    <span class="console-btn font-mono text-[10px] md:text-xs tracking-tighter text-neutral-400" onclick="navigate(-1)">[ PREV ]</span>
                    
                    <span id="display-index" class="text-5xl md:text-6xl font-black italic tracking-tighter leading-none">00</span>
                    
                    <span class="console-btn font-mono text-[10px] md:text-xs tracking-tighter text-neutral-400" onclick="navigate(1)">[ NEXT ]</span>
                </div>
                
                <div class="h-1 w-16 md:w-24 bg-black mt-2"></div>
                <p class="font-mono text-[8px] text-neutral-400 mt-4 tracking-widest uppercase">Swipe_or_Click_to_Explore</p>
            </div>
        </nav>
    </main>

    <footer class="fixed bottom-0 w-full p-4 md:p-12 flex justify-between items-end z-50 pointer-events-none">
        <div class="font-mono text-[7px] md:text-[8px] text-neutral-400 space-y-0.5 uppercase tracking-widest">
            <p>Motion: Sequential_Jump</p>
            <p>System: Industrial_Brutalism</p>
        </div>
        <div class="pointer-events-auto">
            <a href="https://formayfondotaller.com/" target="_blank" class="text-[9px] md:text-[10px] font-bold uppercase tracking-tighter hover:text-neon-500 border-b-2 border-black">FFT_SYSTEM</a>
        </div>
    </footer>

    <script>
        let currentIdx = 0;
        let isSegmented = 0;
        const totalFigures = 10;
        
        const imgDisplay = document.getElementById('main-specimen');
        const stateLabel = document.getElementById('state-label');
        const refIdLabel = document.getElementById('ref-id');
        const indexDisplay = document.getElementById('display-index');
        const touchZone = document.getElementById('touch-zone');

        function updateDisplay() {
            const idStr = currentIdx.toString().padStart(2, '0');
            imgDisplay.src = `svg/${idStr}${isSegmented}.svg`;
            indexDisplay.innerText = idStr;
            refIdLabel.innerText = `${idStr}${isSegmented}`;
            stateLabel.innerText = isSegmented ? "SEGMENTED" : "FILLED";
        }

        touchZone.addEventListener('click', () => {
            isSegmented = isSegmented === 0 ? 1 : 0;
            updateDisplay();
        });

        function navigate(direction) {
            currentIdx += direction;
            if (currentIdx >= totalFigures) currentIdx = 0;
            if (currentIdx < 0) currentIdx = totalFigures - 1;
            updateDisplay();
        }

        let touchStartY = 0;
        window.addEventListener('touchstart', e => { touchStartY = e.touches[0].clientY; }, false);
        window.addEventListener('touchend', e => {
            const touchEndY = e.changedTouches[0].clientY;
            const diff = touchStartY - touchEndY;
            if (Math.abs(diff) > 40) navigate(diff > 0 ? 1 : -1);
        }, false);

        window.addEventListener('wheel', e => { navigate(e.deltaY > 0 ? 1 : -1); }, { passive: true });

        window.addEventListener('keydown', e => {
            if (e.key === 'ArrowDown' || e.key === 'ArrowRight') navigate(1);
            if (e.key === 'ArrowUp' || e.key === 'ArrowLeft') navigate(-1);
            if (e.key === ' ') { e.preventDefault(); isSegmented = isSegmented === 0 ? 1 : 0; updateDisplay(); }
        });

        updateDisplay();
    </script>
</body>
</html>
